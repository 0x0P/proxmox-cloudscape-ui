[phases.setup]
nixPkgs = ["nodejs_22", "bun"]

[phases.install]
cmds = ["bun install --frozen-lockfile"]

[phases.build]
cmds = [
  "bun run build",
  "cp -r public .next/standalone/public 2>/dev/null || true && cp -r .next/static .next/standalone/.next/static",
  "cp server/custom-server.js .next/standalone/custom-server.js"
]

[start]
cmd = "node .next/standalone/custom-server.js"
